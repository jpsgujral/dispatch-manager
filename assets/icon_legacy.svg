<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Deep Orange Gradient for the Bulker Tank -->
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF541E" />
      <stop offset="100%" stop-color="#D83204" />
    </linearGradient>
    <!-- Outer Glow for visual depth -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Elegant Squircle Container -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <circle cx="256" cy="256" r="220" fill="url(#glow)" opacity="0.6" />

  <!-- Stylized Modern Bulker Truck Workspace (Centered) -->
  <g transform="translate(60, 160)">
    <!-- Road Base Line -->
    <rect x="0" y="195" width="392" height="6" rx="3" fill="#475569" opacity="0.8" />
    
    <!-- Heavy Truck Chassis -->
    <rect x="40" y="174" width="280" height="12" rx="2" fill="#64748B" />
    <rect x="290" y="178" width="50" height="8" fill="#475569" />

    <!-- 1. The Bulker Powder Tank -->
    <path d="M 45 70 L 285 70 C 300 70, 312 82, 312 97 L 312 125 C 312 140, 300 152, 285 152 L 45 152 C 30 152, 18 140, 18 125 L 18 97 C 18 82, 30 70, 45 70 Z" fill="url(#orange-grad)" />
    
    <!-- 3 Discharge Hoppers at the bottom of the tank -->
    <path d="M 70 152 L 120 152 L 95 182 Z" fill="url(#orange-grad)" />
    <path d="M 155 152 L 205 152 L 180 182 Z" fill="url(#orange-grad)" />
    <path d="M 240 152 L 290 152 L 265 182 Z" fill="url(#orange-grad)" />

    <!-- Discharge pipelines details -->
    <line x1="95" y1="182" x2="265" y2="182" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <rect x="91" y="180" width="8" height="6" rx="1" fill="#334155" />
    <rect x="176" y="180" width="8" height="6" rx="1" fill="#334155" />
    <rect x="261" y="180" width="8" height="6" rx="1" fill="#334155" />

    <!-- 2. Truck Cab -->
    <path d="M 312 130 L 365 130 L 388 186 L 312 186 Z" fill="#F1F5F9" />
    <path d="M 315 97 L 358 97 C 363 97, 367 101, 369 106 L 379 130 L 315 130 Z" fill="#F1F5F9" />
    <path d="M 325 104 L 354 104 C 357 104, 359 106, 360 109 L 366 124 L 325 124 Z" fill="#1E293B" />
    <path d="M 363 145 M 365 130 L 372 130 L 380 148 L 372 148 Z" fill="url(#orange-grad)" />
    <rect x="378" y="174" width="12" height="10" rx="1" fill="#64748B" />
    <rect x="384" y="177" width="5" height="4" fill="#FDF4E3" />

    <!-- 3. Heavy-Duty Wheels -->
    <circle cx="75" cy="188" r="20" fill="#020617" />
    <circle cx="75" cy="188" r="9" fill="#94A3B8" />
    <circle cx="75" cy="188" r="3" fill="#FFFFFF" />

    <circle cx="120" cy="188" r="20" fill="#020617" />
    <circle cx="120" cy="188" r="9" fill="#94A3B8" />
    <circle cx="120" cy="188" r="3" fill="#FFFFFF" />

    <circle cx="270" cy="188" r="20" fill="#020617" />
    <circle cx="270" cy="188" r="9" fill="url(#orange-grad)" />
    <circle cx="270" cy="188" r="3" fill="#FFFFFF" />

    <circle cx="315" cy="188" r="20" fill="#020617" />
    <circle cx="315" cy="188" r="9" fill="url(#orange-grad)" />
    <circle cx="315" cy="188" r="3" fill="#FFFFFF" />

    <circle cx="365" cy="188" r="20" fill="#020617" />
    <circle cx="365" cy="188" r="9" fill="#94A3B8" />
    <circle cx="365" cy="188" r="3" fill="#FFFFFF" />

    <!-- Fly ash line -->
    <path d="M 35 90 Q 150 90, 165 125 T 280 125" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="6 6" opacity="0.5" />
    <rect x="75" y="63" width="160" height="3" fill="#94A3B8" />
    <line x1="68" y1="70" x2="75" y2="63" stroke="#94A3B8" stroke-width="2" />
  </g>
</svg>
